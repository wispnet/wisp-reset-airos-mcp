services:
  dfs-reset:
    build: .
    command: ["python", "server.py", "--http", "--port", "8080"]
    ports:
      - "8080:8080"
    environment:
      - WISP_UISP_URL=${WISP_UISP_URL}
      - WISP_UISP_TOKEN=${WISP_UISP_TOKEN}
      - WISP_AIROS_USERNAME=${WISP_AIROS_USERNAME:-ubnt}
      - WISP_AIROS_PASSWORD=${WISP_AIROS_PASSWORD:-ubnt}
      - WISP_AIROS_SSL_VERIFY=${WISP_AIROS_SSL_VERIFY:-false}
    volumes:
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
