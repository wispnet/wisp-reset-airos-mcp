services:
  dfs-reset:
    build: .
    container_name: dfs-reset
    command: ["python", "server.py", "--http", "--port", "8080"]
    ports:
      - "127.0.0.1:18083:8080"
    volumes:
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    networks:
      - dfs-reset-net

networks:
  dfs-reset-net:
    name: dfs-reset-net
